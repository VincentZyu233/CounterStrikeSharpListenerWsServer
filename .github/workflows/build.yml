name: Build Plugin

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          VERSION="v$(grep -oP '<Version>\K[^<]+' CounterStrikeSharpListenerWsServer.csproj)-${{ github.run_number }}"

          if echo "$COMMIT_MSG" | grep -q "build release"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -q "build action"; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: |
          VERSION="${{ needs.check.outputs.version }}"
          mkdir -p output
          cp bin/Release/net10.0/CounterStrikeSharpListenerWsServer.dll "output/CounterStrikeSharpListenerWsServer-$VERSION.dll"
          cp bin/Release/net10.0/CounterStrikeSharpListenerWsServer.pdb "output/CounterStrikeSharpListenerWsServer-$VERSION.pdb"
      - uses: actions/upload-artifact@v4
        with:
          name: CounterStrikeSharpListenerWsServer-${{ needs.check.outputs.version }}
          path: output/

  release:
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: CounterStrikeSharpListenerWsServer-${{ needs.check.outputs.version }}
          path: output

      - name: Delete existing release & tag (force fresh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "🗑️ Cleaning up existing release/tag: $VERSION"
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
          git tag -d "$VERSION" 2>/dev/null || true
          sleep 3

      - name: Generate release notes
        env:
          VERSION: ${{ needs.check.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          # 1. Fill static template (badges, download table, install guide)
          sed \
            -e "s|__REPO__|${REPO}|g" \
            -e "s|__VERSION__|${VERSION}|g" \
            -e "s|__BASE_URL__|${BASE_URL}|g" \
            .github/release_template.md > release_notes.md

          # 2. Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          # 3. Append commit log + build info
          {
            echo ""
            echo "---"
            echo ""
            echo "### 🎯 Commit Log"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "Changes since **${PREV_TAG}**:"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:"- \`%h\` %s (%ad) @%an" --date=short --reverse
            else
              echo "All commits:"
              echo ""
              git log --pretty=format:"- \`%h\` %s (%ad) @%an" --date=short --reverse
            fi

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "### 📊 Build Info"
            echo ""
            echo "- **Build Date**: $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "- **Commit**: [\`${GITHUB_SHA::7}\`](https://github.com/${REPO}/commit/${GITHUB_SHA})"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${VERSION}"
            else
              echo "**Full Changelog**: https://github.com/${REPO}/commits/${VERSION}"
            fi
          } >> release_notes.md

          echo "📝 Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release create "$VERSION" \
            --title "CounterStrikeSharpListenerWsServer ${VERSION}" \
            --notes-file release_notes.md \
            --latest \
            output/*

